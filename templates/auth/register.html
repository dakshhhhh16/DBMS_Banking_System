{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8 col-lg-9">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 p-md-5">
        <h1 class="h4 mb-1">Create account</h1>
        <p class="text-muted small mb-4">Register a banking user profile securely.</p>

        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="name">Full name</label>
              <input class="form-control" id="name" name="name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="dob">Date of birth</label>
              <input class="form-control" id="dob" name="dob" type="date">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-control" id="phone" name="phone" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="address">Address</label>
              <input class="form-control" id="address" name="address" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="username">Username</label>
              <input class="form-control" id="username" name="username" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="password">Password</label>
              <input class="form-control" id="password" name="password" type="password" minlength="8" required>
            </div>
          </div>

          <button class="btn btn-primary w-100 mt-4" type="submit">Register</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
